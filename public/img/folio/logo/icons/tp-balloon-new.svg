   <![CDATA[
    .str2 {stroke:#f8ac01;stroke-width:42}
    .str0 {stroke:#f8ac01;stroke-width:42}
    .str1 {stroke:#000;stroke-width:20}
    .fil0 {fill:none}
    .fil1 {fill:#f8ac01;}
.outcircle {-webkit-animation: spin 4.5s linear infinite; animation: spin 4.5s linear infinite; }
    .dotc {-webkit-animation: spin2 4.5s linear infinite; animation: spin2 4.5s linear infinite; }
    
    @-webkit-keyframes spin {
    0%   {
        -webkit-transform: rotate(0deg);  /* Chrome, Opera 15+, Safari 3.1+ */
        -ms-transform: rotate(0deg);  /* IE 9 */
        transform: rotate(0deg);  /* Firefox 16+, IE 10+, Opera */
        transform-origin: 50% 50%;
             }
             100% {
                 -webkit-transform: rotate(360deg);  /* Chrome, Opera 15+, Safari 3.1+ */
                 -ms-transform: rotate(360deg);  /* IE 9 */
                 transform: rotate(360deg);  /* Firefox 16+, IE 10+, Opera */
                    transform-origin: 50% 50%;
             }
         }
         @keyframes spin {
             0%   {
                 -webkit-transform: rotate(0deg);  /* Chrome, Opera 15+, Safari 3.1+ */
                 -ms-transform: rotate(0deg);  /* IE 9 */
                 transform: rotate(0deg);  /* Firefox 16+, IE 10+, Opera */
                    transform-origin: 50% 50%;
             }
             100% {
                 -webkit-transform: rotate(360deg);  /* Chrome, Opera 15+, Safari 3.1+ */
                 -ms-transform: rotate(360deg);  /* IE 9 */
                 transform: rotate(360deg);  /* Firefox 16+, IE 10+, Opera */
                transform-origin: 50% 50%;
             }
         }
 @-webkit-keyframes spin2 {
    0%   {
        -webkit-transform: rotate(0deg);  /* Chrome, Opera 15+, Safari 3.1+ */
        -ms-transform: rotate(0deg);  /* IE 9 */
        transform: rotate(0deg);  /* Firefox 16+, IE 10+, Opera */
        transform-origin: -430% -800%;
             }
             100% {
                 -webkit-transform: rotate(360deg);  /* Chrome, Opera 15+, Safari 3.1+ */
                 -ms-transform: rotate(360deg);  /* IE 9 */
                 transform: rotate(360deg);  /* Firefox 16+, IE 10+, Opera */
                    transform-origin: -430% -800%;
             }
         }
         @keyframes spin2 {
             0%   {
                 -webkit-transform: rotate(0deg);  /* Chrome, Opera 15+, Safari 3.1+ */
                 -ms-transform: rotate(0deg);  /* IE 9 */
                 transform: rotate(0deg);  /* Firefox 16+, IE 10+, Opera */
                    transform-origin: -430% -800%;
             }
             100% {
                 -webkit-transform: rotate(360deg);  /* Chrome, Opera 15+, Safari 3.1+ */
                 -ms-transform: rotate(360deg);  /* IE 9 */
                 transform: rotate(360deg);  /* Firefox 16+, IE 10+, Opera */
                transform-origin: -430% -800%;
             }
         }
        .line1 {-webkit-animation: blink 2s linear infinite; animation: blink 2s linear infinite; }
        .line2 {-webkit-animation: blink 1s linear infinite; animation: blink 1s linear infinite; }
        .woby {-webkit-animation: wobble 2s linear infinite; animation: wobble 2s linear infinite; }
      
        .bplus {-webkit-animation: blink 1500ms linear infinite; animation: blink 1500ms linear infinite; }
        
@-webkit-keyframes blink {
    0%   { opacity:0; }
    100% { opcaity:1; }
}
 @keyframes blink {
    0%   { opacity:0; }
    100% { opcaity:1; }
         }

@-webkit-keyframes wobble {
  from {
    -webkit-transform: none;
    transform: none;
  }

  15% {
    -webkit-transform: translate3d(-25%, 0, 0) rotate3d(0, 0, 1, -5deg);
    transform: translate3d(-25%, 0, 0) rotate3d(0, 0, 1, -5deg);
  }

  30% {
    -webkit-transform: translate3d(20%, 0, 0) rotate3d(0, 0, 1, 3deg);
    transform: translate3d(20%, 0, 0) rotate3d(0, 0, 1, 3deg);
  }

  45% {
    -webkit-transform: translate3d(-15%, 0, 0) rotate3d(0, 0, 1, -3deg);
    transform: translate3d(-15%, 0, 0) rotate3d(0, 0, 1, -3deg);
  }

  60% {
    -webkit-transform: translate3d(10%, 0, 0) rotate3d(0, 0, 1, 2deg);
    transform: translate3d(10%, 0, 0) rotate3d(0, 0, 1, 2deg);
  }

  75% {
    -webkit-transform: translate3d(-5%, 0, 0) rotate3d(0, 0, 1, -1deg);
    transform: translate3d(-5%, 0, 0) rotate3d(0, 0, 1, -1deg);
  }

  to {
    -webkit-transform: none;
    transform: none;
  }
}

@keyframes wobble {
  from {
    -webkit-transform: none;
    transform: none;
  }

  15% {
    -webkit-transform: translate3d(-25%, 0, 0) rotate3d(0, 0, 1, -5deg);
    transform: translate3d(-25%, 0, 0) rotate3d(0, 0, 1, -5deg);
  }

  30% {
    -webkit-transform: translate3d(20%, 0, 0) rotate3d(0, 0, 1, 3deg);
    transform: translate3d(20%, 0, 0) rotate3d(0, 0, 1, 3deg);
  }

  45% {
    -webkit-transform: translate3d(-15%, 0, 0) rotate3d(0, 0, 1, -3deg);
    transform: translate3d(-15%, 0, 0) rotate3d(0, 0, 1, -3deg);
  }

  60% {
    -webkit-transform: translate3d(10%, 0, 0) rotate3d(0, 0, 1, 2deg);
    transform: translate3d(10%, 0, 0) rotate3d(0, 0, 1, 2deg);
  }

  75% {
    -webkit-transform: translate3d(-5%, 0, 0) rotate3d(0, 0, 1, -1deg);
    transform: translate3d(-5%, 0, 0) rotate3d(0, 0, 1, -1deg);
  }

  to {
    -webkit-transform: none;
    transform: none;
  }
}

